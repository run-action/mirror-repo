name: 'Git Mirror'
description: 'Verified host keys git mirroring.'
branding:
  icon: 'copy'
  color: 'blue'

inputs:
  target_url:
    description: 'The SSH URL of the mirror repository (e.g. git@codeberg.org:user/repo.git).'
    required: true
  ssh_key:
    description: 'The private SSH key for the mirror repository.'
    required: true
  lfs:
    description: 'Whether to mirror LFS objects.'
    required: false
    default: 'false'
  strict:
    description: 'Whether to enforce strict host key checking. If false, host keys are still verified if known, but unknown keys are accepted.'
    required: false
    default: 'true'
  host_keys:
    description: 'Additional SSH host keys to trust (in known_hosts format).'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Configure SSH
      shell: bash
      env:
        TARGET_URL: ${{ inputs.target_url }}
        HOST_KEYS: ${{ inputs.host_keys }}
        STRICT: ${{ inputs.strict }}
        ACTION_PATH: ${{ github.action_path }}
      run: bash "$ACTION_PATH/scripts/configure-ssh.sh"

    - name: Mirror Repository
      shell: bash
      env:
        TARGET_URL: ${{ inputs.target_url }}
        SSH_KEY: ${{ inputs.ssh_key }}
        LFS: ${{ inputs.lfs }}
        STRICT: ${{ inputs.strict }}
        ACTION_PATH: ${{ github.action_path }}
      run: bash "$ACTION_PATH/scripts/mirror-repository.sh"
