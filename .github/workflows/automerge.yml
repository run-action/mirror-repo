name: Dependabot Auto-merge

on:
  schedule:
    # First Wednesday after the monthly Monday Dependabot run.
    - cron: "43 9 3-9 * 3"
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: dependabot-automerge-${{ github.repository }}
  cancel-in-progress: false

jobs:
  automerge:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      checks: read
      statuses: read
      actions: read
    steps:
      - uses: run-action/automerge@46cd9d2f9e469f68f91b6c22e2a13f673ccac593 # v1.2.3
        with:
          cooldown-days: 3

