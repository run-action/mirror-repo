name: Check Host Keys

on:
  push:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify Hardcoded Keys
        shell: bash
        run: |
          DATA_FILE="data/known_hosts"
          HOSTS=("github.com" "gitlab.com" "bitbucket.org" "codeberg.org" "sourcehut.org")

          FAILED=0
          for host in "${HOSTS[@]}"; do
            echo "Checking $host..."

            # Get keys from server (only modern keys)
            ACTUAL_KEYS=$(ssh-keyscan -t ecdsa,ed25519 "$host" 2>/dev/null | grep -v "^#" | awk '{print $2,$3}' | sort -u)

            # Get hardcoded keys for this host
            HARDCODED_KEYS=$(grep "^$host " "$DATA_FILE" | awk '{print $2,$3}' | sort -u)

            if [[ -z "$ACTUAL_KEYS" ]]; then
              echo "::error::Could not retrieve any keys for $host"
              FAILED=1
              continue
            fi

            # Check if every actual key is in the hardcoded list
            while read -r key; do
              if ! grep -qF "$key" <<< "$HARDCODED_KEYS"; then
                echo "::error::Unverified key found for $host: $key"
                FAILED=1
              fi
            done <<< "$ACTUAL_KEYS"

            if [[ $FAILED -eq 0 ]]; then
              echo "OK: All keys for $host are verified."
            fi
          done

          if [[ $FAILED -eq 1 ]]; then
            exit 1
          fi
